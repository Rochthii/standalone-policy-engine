apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: security
  labels:
    app: control-plane
spec:
  replicas: 2
  selector:
    matchLabels:
      app: control-plane
  template:
    metadata:
      labels:
        app: control-plane
    spec:
      containers:
      - name: control-plane
        image: rochthii/control-plane:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http-api
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: database-url
        - name: REDIS_URL
          value: "redis-cluster.cache.svc.cluster.local:6379"
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: "200m"
            memory: 256Mi
        readinessProbe:
          httpGet:
            path: /metrics
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /metrics
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: control-plane-service
  namespace: security
spec:
  selector:
    app: control-plane
  ports:
  - port: 80
    targetPort: 8080
    name: http
  type: ClusterIP
